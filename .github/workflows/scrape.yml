name: Scrape Twitter & Generate RSS

on:
  schedule:
    # Every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Restore cookies
        uses: actions/cache@v4
        with:
          path: auth/
          key: twitter-cookies-${{ github.run_id }}
          restore-keys: twitter-cookies-

      - name: Run scraper
        env:
          TWITTER_USERNAME: ${{ secrets.TWITTER_USERNAME }}
          TWITTER_PASSWORD: ${{ secrets.TWITTER_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWEET_COUNT: "50"
          HEADLESS: "true"
        run: |
          cd src
          python main.py

      - name: Commit & push feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/*.xml
          if git diff --staged --quiet; then
            echo "No changes to feeds"
          else
            git commit -m "Update RSS feeds $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
